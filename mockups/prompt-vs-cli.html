ons] [command]\n\ntmux-integrated orchestration daemon for Claude Code\n\nOptions:\n  -V, --version        output the version number\n  --json               Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color           Disable ANSI color (forced when --json is set or stdout\n                       is not a TTY)\n  -h, --help           display help for command\n\nCommands:\n  session [options]    Manage sessions\n  agent [options]      Manage agents\n  orch [options]       Orchestrator commands\n  ask [options]        Submit a structured question deck for the user to answer\n                       (blocks until answered)\n  ui [options]         Interactive surfaces (dashboard, guide)\n  segment [options]    Status-line segments\n  admin [options]      Admin / setup commands\n  companion [options]  Show companion profile and stats\n  deploy [options]     Provision a Tailscale-only sisyphus box on Hetzner or AWS\n                       via Terraform.\n  cloud [options]      Per-repo workflow on the shared cloud box (sync, install,\n                       dashboard).\n  help [command]       display help for command\n\nExit codes:\n  0   success\n  1   permanent error (fallback)\n  2   usage error (bad args/shape)\n  3   not found\n  4   ambiguous (multiple matches — see error.candidates)\n  5   conflict (already-exists, wrong-state)\n  60  transient (retry-safe: daemon down, timeout, lock contention)\n\nOutput:\n  Default        Human-friendly text on stdout; diagnostics on stderr.\n  --json         {ok, schema_version: 1, data?|error?} envelope on stdout.\n\nErrors in --json:\n  {\"ok\": false, \"schema_version\": 1,\n   \"error\": {\"code\": \"<stable-enum>\", \"kind\": \"<usage|not_found|ambiguous|conflict|transient|permanent>\",\n             \"message\": \"...\", \"received\"?: ..., \"expected\"?: ..., \"next\"?: \"...\", \"candidates\"?: [...]}}\n\n\nExamples:\n  $ sis session start \"Implement auth system\"     Start a new session\n  $ sis session start \"Build @reqs.md\" -n auth    Start with name + requirements\n  $ sis session status                            Check current sessions\n  $ sis ui dashboard                              Open the TUI\n  $ sis admin doctor                              Verify installation\n\nRun 'sis ui guide' for a complete usage guide.\n\n"},{"id":"cli-sis-read-h","group":"top","groupLabel":"Top-level commands","label":"sis read","cmd":"sis read -h","body":"Usage: sis [options] [command]\n\ntmux-integrated orchestration daemon for Claude Code\n\nOptions:\n  -V, --version        output the version number\n  --json               Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color           Disable ANSI color (forced when --json is set or stdout\n                       is not a TTY)\n  -h, --help           display help for command\n\nCommands:\n  session [options]    Manage sessions\n  agent [options]      Manage agents\n  orch [options]       Orchestrator commands\n  ask [options]        Submit a structured question deck for the user to answer\n                       (blocks until answered)\n  ui [options]         Interactive surfaces (dashboard, guide)\n  segment [options]    Status-line segments\n  admin [options]      Admin / setup commands\n  companion [options]  Show companion profile and stats\n  deploy [options]     Provision a Tailscale-only sisyphus box on Hetzner or AWS\n                       via Terraform.\n  cloud [options]      Per-repo workflow on the shared cloud box (sync, install,\n                       dashboard).\n  help [command]       display help for command\n\nExit codes:\n  0   success\n  1   permanent error (fallback)\n  2   usage error (bad args/shape)\n  3   not found\n  4   ambiguous (multiple matches — see error.candidates)\n  5   conflict (already-exists, wrong-state)\n  60  transient (retry-safe: daemon down, timeout, lock contention)\n\nOutput:\n  Default        Human-friendly text on stdout; diagnostics on stderr.\n  --json         {ok, schema_version: 1, data?|error?} envelope on stdout.\n\nErrors in --json:\n  {\"ok\": false, \"schema_version\": 1,\n   \"error\": {\"code\": \"<stable-enum>\", \"kind\": \"<usage|not_found|ambiguous|conflict|transient|permanent>\",\n             \"message\": \"...\", \"received\"?: ..., \"expected\"?: ..., \"next\"?: \"...\", \"candidates\"?: [...]}}\n\n\nExamples:\n  $ sis session start \"Implement auth system\"     Start a new session\n  $ sis session start \"Build @reqs.md\" -n auth    Start with name + requirements\n  $ sis session status                            Check current sessions\n  $ sis ui dashboard                              Open the TUI\n  $ sis admin doctor                              Verify installation\n\nRun 'sis ui guide' for a complete usage guide.\n\n"},{"id":"cli-sis-message-h","group":"top","groupLabel":"Top-level commands","label":"sis message","cmd":"sis message -h","body":"Usage: sis [options] [command]\n\ntmux-integrated orchestration daemon for Claude Code\n\nOptions:\n  -V, --version        output the version number\n  --json               Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color           Disable ANSI color (forced when --json is set or stdout\n                       is not a TTY)\n  -h, --help           display help for command\n\nCommands:\n  session [options]    Manage sessions\n  agent [options]      Manage agents\n  orch [options]       Orchestrator commands\n  ask [options]        Submit a structured question deck for the user to answer\n                       (blocks until answered)\n  ui [options]         Interactive surfaces (dashboard, guide)\n  segment [options]    Status-line segments\n  admin [options]      Admin / setup commands\n  companion [options]  Show companion profile and stats\n  deploy [options]     Provision a Tailscale-only sisyphus box on Hetzner or AWS\n                       via Terraform.\n  cloud [options]      Per-repo workflow on the shared cloud box (sync, install,\n                       dashboard).\n  help [command]       display help for command\n\nExit codes:\n  0   success\n  1   permanent error (fallback)\n  2   usage error (bad args/shape)\n  3   not found\n  4   ambiguous (multiple matches — see error.candidates)\n  5   conflict (already-exists, wrong-state)\n  60  transient (retry-safe: daemon down, timeout, lock contention)\n\nOutput:\n  Default        Human-friendly text on stdout; diagnostics on stderr.\n  --json         {ok, schema_version: 1, data?|error?} envelope on stdout.\n\nErrors in --json:\n  {\"ok\": false, \"schema_version\": 1,\n   \"error\": {\"code\": \"<stable-enum>\", \"kind\": \"<usage|not_found|ambiguous|conflict|transient|permanent>\",\n             \"message\": \"...\", \"received\"?: ..., \"expected\"?: ..., \"next\"?: \"...\", \"candidates\"?: [...]}}\n\n\nExamples:\n  $ sis session start \"Implement auth system\"     Start a new session\n  $ sis session start \"Build @reqs.md\" -n auth    Start with name + requirements\n  $ sis session status                            Check current sessions\n  $ sis ui dashboard                              Open the TUI\n  $ sis admin doctor                              Verify installation\n\nRun 'sis ui guide' for a complete usage guide.\n\n"},{"id":"cli-sis-ask-h","group":"top","groupLabel":"Top-level commands","label":"sis ask","cmd":"sis ask -h","body":"Usage: sis ask [options] [command]\n\nSubmit a structured question deck for the user to answer (blocks until answered)\n\nOptions:\n  --json                   Emit JSON to stdout; suppress ANSI and prose\n                           diagnostics\n  --no-color               Disable ANSI color (forced when --json is set or\n                           stdout is not a TTY)\n  -h, --help               display help for command\n\nCommands:\n  submit [options] <file>  Submit a deck JSON file and block until the user\n                           answers\n  poll [options] <askId>   Block until <askId> is answered, then print output\n                           JSON\n  peek [options] <askId>   Print {askId, status, completedAt?, output?} for\n                           <askId> without blocking\n"},{"id":"cli-sis-dashboard-h","group":"top","groupLabel":"Top-level commands","label":"sis dashboard","cmd":"sis dashboard -h","body":"Usage: sis dashboard [options]\n\nLaunch the TUI dashboard for monitoring and managing sessions\n\nOptions:\n  --json      Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color  Disable ANSI color (forced when --json is set or stdout is not a\n              TTY)\n  -h, --help  display help for command\n"},{"id":"cli-sis-agent-h","group":"agent","groupLabel":"Agent commands (orchestrator-facing)","label":"sis agent","cmd":"sis agent -h","body":"Usage: sis agent [options] [command]\n\nManage agents\n\nOptions:\n  --json                         Emit JSON to stdout; suppress ANSI and prose\n                                 diagnostics\n  --no-color                     Disable ANSI color (forced when --json is set\n                                 or stdout is not a TTY)\n  -h, --help                     display help for command\n\nCommands:\n  spawn [options] [instruction]  Spawn a new agent (orchestrator only)\n  submit [options]               Submit work report and exit (agent only)\n  report [options]               Send a progress report without exiting (agent\n                                 only)\n  await [options] <agentId>      Block until an agent reaches a terminal status,\n                                 then print its final report inline. Marks the\n                                 agent as consumed-inline so its report is\n                                 suppressed from the next cycle.\n  kill [options] <agentId>       Kill a running agent\n  restart [options] <agentId>    Restart a failed/killed/lost agent in a new\n                                 tmux pane\n  tell [options] <id> [text]     Type a prompt directly into an agent pane\n                                 (agent-NNN). Submits immediately unlike\n                                 `message`.\n  read [options] <id>            Print the Claude conversation transcript for an\n                                 agent (agent-NNN).\n  help [command]                 display help for command\n"},{"id":"cli-sis-agent-spawn-h","group":"agent","groupLabel":"Agent commands (orchestrator-facing)","label":"sis agent spawn","cmd":"sis agent spawn -h","body":"Usage: sis agent spawn [options] [instruction]\n\nSpawn a new agent (orchestrator only)\n\nArguments:\n  instruction                  Task instruction for the agent\n\nOptions:\n  --agent-type <type>          Agent type (e.g. sisyphus:debug,\n                               sisyphus:explore) (default: \"worker\")\n  --name <name>                Agent name\n  --instruction <instruction>  Task instruction for the agent (or pipe via\n                               stdin)\n  --stdin                      Force-read instruction from stdin (avoids shell\n                               escaping for long prompts)\n  --repo <name>                Repo subdirectory to use for this agent\n  --session <sessionId>        Session ID (defaults to SISYPHUS_SESSION_ID env\n                               var)\n  --list-types                 List available agent types and exit\n  --json                       Emit JSON to stdout; suppress ANSI and prose\n                               diagnostics\n  --no-color                   Disable ANSI color (forced when --json is set or\n                               stdout is not a TTY)\n  -h, --help                   display help for command\n\nExamples:\n  $ sis agent spawn --agent-type sisyphus:explore --name find-auth \"Locate auth middleware in src/\"\n  $ cat big-prompt.md | sis agent spawn --stdin --agent-type devcore:programmer --name impl-1\n  $ sis agent spawn --list-types --json\n\nOutput:\n  Default       \"Agent spawned: <agentId>\" plus follow-up hints.\n  --json        { ok, schema_version: 1, data: { agentId, sessionId, agentType, name } }\n                For --list-types: { agentTypes: [{qualifiedName, source, description}, ...] }\n\nExit codes: 0 ok | 2 usage (missing --name / --session / instruction) | 3 not_found (unknown session) | 5 conflict.\n\nNext on success:\n  $ sis agent await <agentId>   # block on this agent's final report\n  $ sis orch yield               # when done spawning all agents this cycle\n\nDelegate outcomes, not implementations — say what needs to happen and why,\nnot the code to write.\n\nInline understanding: for mid-flow \"why does X behave this way?\" / \"what's the\ncontract between X and Y?\" questions, spawn sisyphus:explore and consume its\nreport inline (await it). One explore per system, spawned in parallel, awaited\nconcurrently — raw search noise stays out of your context. Don't await\nlong-running implementors; you'll burn the turn waiting.\n"},{"id":"cli-sis-agent-submit-h","group":"agent","groupLabel":"Agent commands (orchestrator-facing)","label":"sis agent submit","cmd":"sis agent submit -h","body":"Usage: sis agent submit [options]\n\nSubmit work report and exit (agent only)\n\nOptions:\n  --report <report>      Work report (or pipe via stdin)\n  --stdin                Force-read report from stdin (avoids shell escaping for\n                         long prompts)\n  --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID env var)\n  --json                 Emit JSON to stdout; suppress ANSI and prose\n                         diagnostics\n  --no-color             Disable ANSI color (forced when --json is set or stdout\n                         is not a TTY)\n  -h, --help             display help for command\n\nExamples:\n  $ sis agent submit --report \"Found auth in src/middleware/auth.ts:42\"\n  $ cat report.md | sis agent submit --stdin\n\nWhen NOT to use:\n  Only sub-agents call submit. The orchestrator uses `sis session complete`.\n\nOutput:\n  Default       \"Report submitted successfully\" + close-pane notice on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, agentId } }\n\nExit codes: 0 ok | 2 usage (missing report or env) | 3 not_found.\n\nAfter this command the agent pane closes; the orchestrator resumes when all\nspawned agents have submitted.\n"},{"id":"cli-sis-agent-report-h","group":"agent","groupLabel":"Agent commands (orchestrator-facing)","label":"sis agent report","cmd":"sis agent report -h","body":"Usage: sis agent report [options]\n\nSend a progress report without exiting (agent only)\n\nOptions:\n  --message <message>    Progress report content\n  --stdin                Force-read message from stdin (avoids shell escaping\n                         for long prompts)\n  --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID env var)\n  --json                 Emit JSON to stdout; suppress ANSI and prose\n                         diagnostics\n  --no-color             Disable ANSI color (forced when --json is set or stdout\n                         is not a TTY)\n  -h, --help             display help for command\n\nExamples:\n  $ sis agent report --message \"Located auth in 3 files; continuing investigation.\"\n  $ cat checkpoint.md | sis agent report --stdin\n\nWhat to report (flag it — don't work around it; the orchestrator routes it\nto the right agent, you stay focused on your task):\n  - Code smells — unexpected complexity, unclear architecture, wrong-looking code\n  - Out-of-scope issues — failing tests, missing error handling, broken assumptions\n  - Blockers — anything preventing you from completing your task\n  Include exact file:line so the next agent can navigate.\n\nWhen NOT to use:\n  Use `sis agent submit` to deliver the final report and exit. `report`\n  is non-terminal — it records an intermediate checkpoint and the agent\n  keeps running.\n\nOutput:\n  Default       \"Progress report recorded\" on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, agentId } }\n\nExit codes: 0 ok | 2 usage | 3 not_found.\n"},{"id":"cli-sis-agent-await-h","group":"agent","groupLabel":"Agent commands (orchestrator-facing)","label":"sis agent await","cmd":"sis agent await -h","body":"Usage: sis agent await [options] <agentId>\n\nBlock until an agent reaches a terminal status, then print its final report\ninline. Marks the agent as consumed-inline so its report is suppressed from the\nnext cycle.\n\nArguments:\n  agentId                Agent ID to await\n\nOptions:\n  --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID env var)\n  --json                 Emit JSON to stdout; suppress ANSI and prose\n                         diagnostics\n  --no-color             Disable ANSI color (forced when --json is set or stdout\n                         is not a TTY)\n  -h, --help             display help for command\n\nExamples:\n  $ sis agent await ag-7f2a-1\n  $ sis agent await ag-7f2a-1 --json | jq -r '.data.report'\n\nBehavior:\n  Blocks for up to 24h waiting on the agent. Status header goes to stderr;\n  the agent's report body goes to stdout — pipe to a file safely.\n\nOutput:\n  Default       Status header on stderr: `[<status>] <agentId> (<label>)`\n                Report body on stdout (file contents, ends with newline).\n  --json        { ok, schema_version: 1, data: { agentId, sessionId, status, agentName, agentType, reportPath, report } }\n\nExit codes: 0 ok | 2 usage (missing --session) | 3 not_found (unknown agent) | 60 transient (daemon timeout).\n"},{"id":"cli-sis-agent-kill-h","group":"agent","groupLabel":"Agent commands (orchestrator-facing)","label":"sis agent kill","cmd":"sis agent kill -h","body":"Usage: sis agent kill [options] <agentId>\n\nKill a running agent\n\nOptions:\n  -s, --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID)\n  --json                     Emit JSON to stdout; suppress ANSI and prose\n                             diagnostics\n  --no-color                 Disable ANSI color (forced when --json is set or\n                             stdout is not a TTY)\n  -h, --help                 display help for command\n\nExamples:\n  $ sis agent kill agent-3\n  $ sis agent kill agent-3 --session sess-7f2a --json\n\nOutput:\n  Default       \"Agent <id> killed.\" on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, agentId } }\n\nExit codes: 0 ok | 2 usage (missing --session) | 3 not_found.\n"},{"id":"cli-sis-agent-restart-h","group":"agent","groupLabel":"Agent commands (orchestrator-facing)","label":"sis agent restart","cmd":"sis agent restart -h","body":"Usage: sis agent restart [options] <agentId>\n\nRestart a failed/killed/lost agent in a new tmux pane\n\nOptions:\n  -s, --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID)\n  --json                     Emit JSON to stdout; suppress ANSI and prose\n                             diagnostics\n  --no-color                 Disable ANSI color (forced when --json is set or\n                             stdout is not a TTY)\n  -h, --help                 display help for command\n\nExamples:\n  $ sis agent restart agent-3\n  $ sis agent restart agent-3 --session sess-7f2a --json\n\nOutput:\n  Default       \"Agent <id> restarted.\" on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, agentId } }\n\nExit codes: 0 ok | 2 usage | 3 not_found | 5 conflict (agent still running).\n"},{"id":"cli-sis-orch-h","group":"orch","groupLabel":"Orchestrator commands","label":"sis orch","cmd":"sis orch -h","body":"Usage: sis orch [options] [command]\n\nOrchestrator commands\n\nOptions:\n  --json                       Emit JSON to stdout; suppress ANSI and prose\n                               diagnostics\n  --no-color                   Disable ANSI color (forced when --json is set or\n                               stdout is not a TTY)\n  -h, --help                   display help for command\n\nCommands:\n  yield [options]              Yield control back to daemon (orchestrator only)\n  tell [options] [text]        Type a prompt directly into the orchestrator\n                               pane. Submits immediately unlike `message`.\n  message [options] [content]  Queue a message for the orchestrator to see on\n                               next cycle\n  read [options]               Print the Claude conversation transcript for the\n                               orchestrator.\n  help [command]               display help for command\n"},{"id":"cli-sis-orch-yield-h","group":"orch","groupLabel":"Orchestrator commands","label":"sis orch yield","cmd":"sis orch yield -h","body":"Usage: sis orch yield [options]\n\nYield control back to daemon (orchestrator only)\n\nOptions:\n  --prompt <text>        Short orienting nudge for the next cycle (or pipe via\n                         stdin) — name what just happened; leave tactical\n                         decisions to the fresh read of the reports\n  --stdin                Force-read prompt from stdin (avoids shell escaping for\n                         long prompts)\n  --mode <mode>          System prompt mode for next cycle (discovery, planning,\n                         implementation, validation, completion). Required —\n                         pass the current mode to stay in it.\n  --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID env var)\n  --json                 Emit JSON to stdout; suppress ANSI and prose\n                         diagnostics\n  --no-color             Disable ANSI color (forced when --json is set or stdout\n                         is not a TTY)\n  -h, --help             display help for command\n\nExamples:\n  $ sis orch yield --mode planning --prompt \"agents finished discovery; ready to design\"\n  $ sis orch yield --mode implementation --stdin <prompt.md\n\n--mode (required, every cycle): pass the CURRENT mode to stay in the phase,\na DIFFERENT mode to transition. There is no implicit \"keep current mode\".\n\n--prompt — orient the next cycle, don't script it:\n  Two clauses only: what just landed (the artifacts) + the live question.\n  Under three sentences. The next cycle has the same reports / roadmap /\n  strategy / digest and runs the same playbook — it triages from a fresh\n  read, not from your plan.\n\n  good: --prompt \"Three per-commit reviews complete. Address findings; if any\n        is ambiguous work with the user, then decide investigate vs synthesize.\"\n  good: --prompt \"Explore mapped the auth + session layers. Open: is the\n        session refactor in scope or a follow-up?\"\n  bad:  --prompt \"Read the 3 review docs. If thin, respawn narrower. Then\n        cross-cutting pass. Then synthesize sorted by severity.\"\n        — scripts the next cycle before it has read anything.\n\n  Don't write these rules into the string. \"Stay open\", \"don't pre-decide\"\n  are for you, not the next orchestrator — it already has them. The --mode\n  token itself signals a phase change; the prompt is orienting content only.\n\nNEVER yield while waiting for user input. Yield kills this process and\nrespawns a fresh instance with no memory of the conversation — you'll see the\nsame prompt, have no answer, and loop forever. Ask in the pane and stop instead.\n\nOutput:\n  Default       \"Yielded. Waiting for agents to complete.\" on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, mode } }\n\nExit codes: 0 ok | 2 usage (missing --mode / --session) | 3 not_found.\n\nAfter yielding the daemon blocks until all running agents submit, then\nrespawns the orchestrator with --mode applied for the next cycle.\n"},{"id":"cli-sis-session-h","group":"session","groupLabel":"Session lifecycle","label":"sis session","cmd":"sis session -h","body":"Usage: sis session [options] [command]\n\nManage sessions\n\nOptions:\n  --json                                   Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color                               Disable ANSI color (forced when --json is set or stdout is not a TTY)\n  -h, --help                               display help for command\n\nCommands:\n  start [options] [task]                   Start a new sisyphus session\n  status [options] [session-id]            Show session status\n  list [options]                           List sessions (defaults to current project)\n  kill [options] <sessionId>               Kill a running session and all its agents\n  delete [options] <sessionId>             Delete a session and all its data (state.json, logs, panes)\n  resume [options] <session-id> [message]  Respawn orchestrator with new instructions (for paused/completed sessions)\n  continue [options]                       Clear roadmap and continue working on a completed session (stays in current cycle)\n  complete [options]                       Mark session as completed (orchestrator only)\n  rollback [options] <sessionId> <cycle>   Roll back a session to a previous cycle boundary\n  reconnect [options] <session-id>         Reconnect daemon to an orphaned tmux session (no state change, no orchestrator spawn)\n  clone [options] <goal>                   Clone the current session into a new independent session with a different goal\n  task [options] <task>                    Update the session task/goal\n  effort [options] <sessionId> <tier>      Set the pipeline effort tier for a session (future cycles only; running agents keep their original prompt)\n  dangerous [options] [sessionId] [state]  Toggle dangerous mode (auto-accept first option for every ask). state: on|off|toggle (default: toggle)\n  context [options] <sessionId>            Print session context XML (same as dashboard space y C)\n  quiesce [options] <session-id>           Pause a session at the next quiesce point (or now with --force). No cloud push.\n  export [options] [session-id]            Export session data as zip to ~/Downloads\n  history [options] [session]              Browse session history and metrics\n  scratch [options] [prompt...]            Open a standalone Claude Code session in the home tmux session\n  requirements [options] [file]            Export and inspect EARS requirements produced by `sisyphus:spec` (or compatible writers)\n  help [command]                           display help for command\n"},{"id":"cli-sis-session-kill-h","group":"session","groupLabel":"Session lifecycle","label":"sis session kill","cmd":"sis session kill -h","body":"Usage: sis session kill [options] <sessionId>\n\nKill a running session and all its agents\n\nOptions:\n  --json      Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color  Disable ANSI color (forced when --json is set or stdout is not a\n              TTY)\n  -h, --help  display help for command\n\nExamples:\n  $ sis session kill sess-7f2a\n  $ sis session kill sess-7f2a --json\n\nOutput:\n  Default       Prose lines on stdout; \"Session <id> killed.\" then cleanup count.\n  --json        { ok, schema_version: 1, data: { sessionId, killedAgents } }\n\nExit codes: 0 ok | 3 not_found | 60 transient | see `sis --help` for full table.\n\nNext on success:\n  $ sis session list                  # confirm the session is gone\n"},{"id":"cli-sis-session-delete-h","group":"session","groupLabel":"Session lifecycle","label":"sis session delete","cmd":"sis session delete -h","body":"Usage: sis session delete [options] <sessionId>\n\nDelete a session and all its data (state.json, logs, panes)\n\nOptions:\n  --cwd <path>  Project directory (default:\n                \"/Users/silasrhyneer/Code/cli/sisyphus\")\n  --json        Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color    Disable ANSI color (forced when --json is set or stdout is not a\n                TTY)\n  -h, --help    display help for command\n\nExamples:\n  $ sis session delete sess-7f2a\n  $ sis session delete sess-7f2a --cwd /path/to/project --json\n\nOutput:\n  Default       \"Session <id> deleted.\" on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId } }\n\nExit codes: 0 ok | 3 not_found | 5 conflict (session still running — kill first).\n\nNext on success:\n  $ sis session list --all            # confirm removal\n"},{"id":"cli-sis-session-resume-h","group":"session","groupLabel":"Session lifecycle","label":"sis session resume","cmd":"sis session resume -h","body":"Usage: sis session resume [options] <session-id> [message]\n\nRespawn orchestrator with new instructions (for paused/completed sessions)\n\nArguments:\n  session-id  Session ID to resume\n  message     Additional instructions for the orchestrator (omit when using\n              --stdin)\n\nOptions:\n  --stdin     Read message from stdin (avoids shell escaping for long prompts)\n  --json      Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color  Disable ANSI color (forced when --json is set or stdout is not a\n              TTY)\n  -h, --help  display help for command\n\nExamples:\n  $ sis session resume sess-7f2a \"Now also handle refresh tokens.\"\n  $ sis session resume sess-7f2a --stdin <new-roadmap.md\n\nWhen NOT to use:\n  Use `continue` to keep working on a completed session without new\n  instructions — `continue` clears the roadmap; `resume` preserves history.\n\nOutput:\n  Default       \"Session <id> resumed\" + tmux attach hint.\n  --json        { ok, schema_version: 1, data: { sessionId, tmuxSessionName? } }\n\nExit codes: 0 ok | 2 usage | 3 not_found | 5 conflict (session already running).\n"},{"id":"cli-sis-session-continue-h","group":"session","groupLabel":"Session lifecycle","label":"sis session continue","cmd":"sis session continue -h","body":"Usage: sis session continue [options]\n\nClear roadmap and continue working on a completed session (stays in current\ncycle)\n\nOptions:\n  --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID env var)\n  --json                 Emit JSON to stdout; suppress ANSI and prose\n                         diagnostics\n  --no-color             Disable ANSI color (forced when --json is set or stdout\n                         is not a TTY)\n  -h, --help             display help for command\n\nExamples:\n  $ sis session continue\n  $ sis session continue --session sess-7f2a --json\n\nWhen to use:\n  After `complete`, when you want to keep working in the same session.\n\nWhen NOT to use:\n  Use `sis session resume` instead when restarting with new instructions —\n  resume preserves history; continue wipes the roadmap.\n\nOutput:\n  Default       \"Session reactivated. Roadmap cleared.\" then next-step hints.\n  --json        { ok, schema_version: 1, data: { sessionId } }\n\nExit codes: 0 ok | 2 usage (missing session id) | 3 not_found.\n\nNext on success:\n  Write a new roadmap, then `sis agent spawn ...`.\n"},{"id":"cli-sis-session-complete-h","group":"session","groupLabel":"Session lifecycle","label":"sis session complete","cmd":"sis session complete -h","body":"Usage: sis session complete [options]\n\nMark session as completed (orchestrator only)\n\nOptions:\n  --report <report>      Final completion report\n  --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID env var)\n  --json                 Emit JSON to stdout; suppress ANSI and prose\n                         diagnostics\n  --no-color             Disable ANSI color (forced when --json is set or stdout\n                         is not a TTY)\n  -h, --help             display help for command\n\nExamples:\n  $ sis session complete --report \"All TODOs done; tests pass.\"\n  $ sis session complete --session sess-7f2a --report @report.md --json\n\nOutput:\n  Default       \"Session completed.\" plus a continue-hint on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId } }\n\nWhen NOT to use:\n  This is for the orchestrator to signal end-of-roadmap. Sub-agents use\n  `sis agent submit` to deliver their final report instead.\n\nExit codes: 0 ok | 2 usage (missing session id) | 3 not_found.\n\nNext on success:\n  $ sis session continue      # clear roadmap and keep working in the same session\n"},{"id":"cli-sis-session-rollback-h","group":"session","groupLabel":"Session lifecycle","label":"sis session rollback","cmd":"sis session rollback -h","body":"Usage: sis session rollback [options] <sessionId> <cycle>\n\nRoll back a session to a previous cycle boundary\n\nOptions:\n  --json      Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color  Disable ANSI color (forced when --json is set or stdout is not a\n              TTY)\n  -h, --help  display help for command\n\nExamples:\n  $ sis session rollback sess-7f2a 3        # restore state as of cycle 3\n  $ sis session rollback sess-7f2a 3 --json\n\nOutput:\n  Default       \"Session <id> rolled back to cycle <N>.\" + resume hint.\n  --json        { ok, schema_version: 1, data: { sessionId, restoredToCycle } }\n\nExit codes: 0 ok | 2 usage (cycle must be positive int) | 3 not_found.\n\nNext on success:\n  $ sis session resume <sessionId>     # respawn orchestrator from restored state\n"},{"id":"cli-sis-session-reconnect-h","group":"session","groupLabel":"Session lifecycle","label":"sis session reconnect","cmd":"sis session reconnect -h","body":"Usage: sis session reconnect [options] <session-id>\n\nReconnect daemon to an orphaned tmux session (no state change, no orchestrator\nspawn)\n\nArguments:\n  session-id  Session ID to reconnect\n\nOptions:\n  --json      Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color  Disable ANSI color (forced when --json is set or stdout is not a\n              TTY)\n  -h, --help  display help for command\n\nOutput:\n  Default       \"Reconnected to <tmux-session> (window <id>)\" on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, tmuxSessionName, tmuxWindowId } }\n\nExit codes: 0 ok | 3 not_found.\n"},{"id":"cli-sis-session-clone-h","group":"session","groupLabel":"Session lifecycle","label":"sis session clone","cmd":"sis session clone -h","body":"Usage: sis session clone [options] <goal>\n\nClone the current session into a new independent session with a different goal\n\nArguments:\n  goal                  Goal for the cloned session\n\nOptions:\n  -c, --context <text>  Additional context for the clone\n  --strategy            Copy strategy.md from the source session\n  -n, --name <name>     Name for the cloned session\n  --json                Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color            Disable ANSI color (forced when --json is set or stdout\n                        is not a TTY)\n  -h, --help            display help for command\n\nExamples:\n  $ sis session clone \"Refactor billing module separately\"\n  $ sis session clone \"...\" -c \"use stripe-v2 API\" --strategy --name billing-rework\n\nWhen NOT to use:\n  Clone is orchestrator-only — sub-agents must `sis orch message` the orchestrator\n  to request a clone. Cloning creates a separate session with its own roadmap;\n  the caller is no longer responsible for the cloned goal.\n\nOutput:\n  Default       \"Session cloned successfully.\" plus scope-update reminders.\n  --json        { ok, schema_version: 1, data: { sessionId, tmuxSessionName } }\n\nExit codes: 0 ok | 2 usage (missing env / wrong agent) | 3 not_found | 5 conflict.\n"},{"id":"cli-sis-session-task-h","group":"session","groupLabel":"Session lifecycle","label":"sis session task","cmd":"sis session task -h","body":"Usage: sis session task [options] <task>\n\nUpdate the session task/goal\n\nOptions:\n  --session <sessionId>  Session ID (defaults to SISYPHUS_SESSION_ID env var)\n  --json                 Emit JSON to stdout; suppress ANSI and prose\n                         diagnostics\n  --no-color             Disable ANSI color (forced when --json is set or stdout\n                         is not a TTY)\n  -h, --help             display help for command\n\nExamples:\n  $ sis session task \"Refactor auth to use refresh tokens\"\n  $ sis session task \"...\" --session sess-7f2a --json\n\nOutput:\n  Default       \"Task updated\" on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, task } }\n\nExit codes: 0 ok | 2 usage | 3 not_found.\n"},{"id":"cli-sis-session-effort-h","group":"session","groupLabel":"Session lifecycle","label":"sis session effort","cmd":"sis session effort -h","body":"Usage: sis session effort [options] <sessionId> <tier>\n\nSet the pipeline effort tier for a session (future cycles only; running agents\nkeep their original prompt)\n\nOptions:\n  --json      Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color  Disable ANSI color (forced when --json is set or stdout is not a\n              TTY)\n  -h, --help  display help for command\n\nExamples:\n  $ sis session effort sess-7f2a high\n  $ sis session effort sess-7f2a xhigh --json\n\nOutput:\n  Default       \"Effort tier set to '<tier>' for session <id>\" + scope note.\n  --json        { ok, schema_version: 1, data: { sessionId, effort } }\n\nExit codes: 0 ok | 2 usage (bad tier) | 3 not_found.\n"},{"id":"cli-sis-session-dangerous-h","group":"session","groupLabel":"Session lifecycle","label":"sis session dangerous","cmd":"sis session dangerous -h","body":"Usage: sis session dangerous [options] [sessionId] [state]\n\nToggle dangerous mode (auto-accept first option for every ask). state:\non|off|toggle (default: toggle)\n\nOptions:\n  --json      Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color  Disable ANSI color (forced when --json is set or stdout is not a\n              TTY)\n  -h, --help  display help for command\n\nExamples:\n  $ sis session dangerous                 # toggle current session's mode\n  $ sis session dangerous sess-7f2a on\n  $ sis session dangerous sess-7f2a off --json\n\nOutput:\n  Default       \"DANGEROUS mode {ON|OFF} for session <id>\" + flushed-ask count.\n  --json        { ok, schema_version: 1, data: { sessionId, enabled, flushed } }\n\nExit codes: 0 ok | 2 usage (bad state) | 3 not_found.\n"},{"id":"cli-sis-session-context-h","group":"session","groupLabel":"Session lifecycle","label":"sis session context","cmd":"sis session context -h","body":"Usage: sis session context [options] <sessionId>\n\nPrint session context XML (same as dashboard space y C)\n\nOptions:\n  --cwd <path>  Working directory of the session\n  --json        Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color    Disable ANSI color (forced when --json is set or stdout is not a\n                TTY)\n  -h, --help    display help for command\n\nOutput:\n  Default       XML context blob on stdout.\n  --json        { ok, schema_version: 1, data: { sessionId, context } }\n\nExit codes: 0 ok | 3 not_found.\n"},{"id":"cli-sis-admin-h","group":"admin","groupLabel":"Admin / setup","label":"sis admin","cmd":"sis admin -h","body":"Usage: sis admin [options] [command]\n\nAdmin / setup commands\n\nOptions:\n  --json                               Emit JSON to stdout; suppress ANSI and\n                                       prose diagnostics\n  --no-color                           Disable ANSI color (forced when --json is\n                                       set or stdout is not a TTY)\n  -h, --help                           display help for command\n\nCommands:\n  setup [options]                      One-time setup: install dependencies,\n                                       daemon, keybindings, and commands\n  setup-keybind [options] [cycle-key]  Install sisyphus tmux keybindings\n                                       (default: M-s cycle, C-s prefix)\n  check-keybinds [options]             Verify tmux keybind state before asking\n                                       the user to try a sisyphus keybind\n  check-statusbar [options]            Inspect tmux statusbar state and emit a\n                                       Claude decision tree for non-clobbering\n                                       integration\n  home-init [options] <name> <cwd>     Bootstrap a tmux home session with the\n                                       sisyphus dashboard.\n  doctor [options]                     Check sisyphus installation health\n  bug [options] [description]          Report a sisyphus bug — files a GitHub\n                                       issue with feedback + diagnostics\n  init [options]                       Initialize sisyphus configuration for\n                                       this project\n  uninstall [options]                  Unload the sisyphus daemon from launchd\n                                       and remove the plist\n  configure-upload [options] [url]     Configure the upload proxy from a\n                                       token-bearing URL (writes\n                                       ~/.sisyphus/config.json)\n  upload [options] [session-id]        Upload a session zip to the configured\n                                       upload endpoint\n  help [command]                       display help for command\n"},{"id":"cli-sis-segment-h","group":"admin","groupLabel":"Admin / setup","label":"sis segment","cmd":"sis segment -h","body":"Usage: sis segment [options] [command]\n\nStatus-line segments\n\nOptions:\n  --json                Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color            Disable ANSI color (forced when --json is set or stdout\n                        is not a TTY)\n  -h, --help            display help for command\n\nCommands:\n  register [options]    Register or update an external status bar segment\n  unregister [options]  Remove an external status bar segment\n  help [command]        display help for command\n"},{"id":"cli-sis-cloud-h","group":"admin","groupLabel":"Admin / setup","label":"sis cloud","cmd":"sis cloud -h","body":"Usage: sis cloud [options] [command]\n\nPer-repo workflow on the shared cloud box (sync, install, dashboard).\n\nOptions:\n  --json                          Emit JSON to stdout; suppress ANSI and prose\n                                  diagnostics\n  --no-color                      Disable ANSI color (forced when --json is set\n                                  or stdout is not a TTY)\n  -h, --help                      display help for command\n\nCommands:\n  sync [options]                  Rsync this repo to the cloud box; ensures\n                                  grove is installed and the repo is registered.\n  install [options]               Run the repo's package-manager install on the\n                                  box.\n  session [options]               Create or refresh the box-side tmux home\n                                  session for this repo.\n  attach [options]                Attach to the box-side tmux home session for\n                                  this repo.\n  start [options]                 Sync, install, and start the dashboard session\n                                  in one shot. (Stops short of attach.)\n  claude-login [options]          Run `claude auth login` on the box\n                                  (device-code flow; paste the URL into your\n                                  local browser).\n  status [options]                Print box-side status for this repo (planted,\n                                  session running, last sync/install).\n  handoff [options] <session-id>  Hand off a live session to the cloud box.\n                                  Queues at next quiesce; --force interrupts\n                                  now.\n  reclaim [options] <session-id>  Pull a handed-off session back from the cloud\n                                  box and resume locally.\n  help [command]                  display help for command\n"},{"id":"cli-sis-deploy-h","group":"admin","groupLabel":"Admin / setup","label":"sis deploy","cmd":"sis deploy -h","body":"Usage: sis deploy [options] [command]\n\nProvision a Tailscale-only sisyphus box on Hetzner or AWS via Terraform.\n\nOptions:\n  --providers        List available providers and provisioning status.\n  --json             Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color         Disable ANSI color (forced when --json is set or stdout is\n                     not a TTY)\n  -h, --help         display help for command\n\nCommands:\n  auth [options]     Configure deploy credentials.\n  hetzner [options]  hetzner commands.\n  aws [options]      aws commands.\n"},{"id":"cli-sis-companion-h","group":"admin","groupLabel":"Admin / setup","label":"sis companion","cmd":"sis companion -h","body":"Usage: sis companion [options] [command]\n\nShow companion profile and stats\n\nOptions:\n  --name <name>         Set companion name\n  --badges              Show badge gallery\n  --json                Emit JSON to stdout; suppress ANSI and prose diagnostics\n  --no-color            Disable ANSI color (forced when --json is set or stdout\n                        is not a TTY)\n  -h, --help            display help for command\n\nCommands:\n  memory [options]      Show accumulated companion observations grouped by\n                        category\n  context [options]     Emit per-prompt context for the companion plugin hook.\n                        Caches the last emission per claude session and writes\n                        only the delta on subsequent calls (or nothing, when\n                        unchanged).\n  pane [options]        Open (or focus) a side claude pane next to the dashboard\n  popup-test [options]  Show a test commentary popup to validate feedback key\n                        handling\n"}]};
const KEY = 'sisviz:comments:v1';
const $ = (s, r) => (r ? r : document).querySelector(s);
const $$ = (s, r) => Array.from((r ? r : document).querySelectorAll(s));

function loadComments() {
  const raw = localStorage.getItem(KEY);
  if (!raw) return {};
  try { return JSON.parse(raw); } catch (e) { return {}; }
}
function saveComments() {
  localStorage.setItem(KEY, JSON.stringify(state.comments));
  updateNoteCount();
}
function noteCount() {
  let n = 0;
  for (const docId in state.comments) {
    for (const k in state.comments[docId]) n += state.comments[docId][k].length;
  }
  return n;
}
function updateNoteCount() { $('#note-count').textContent = noteCount(); }

const state = {
  left:  null,
  right: null,
  search: '',
  comments: loadComments(),
  openComposer: null,
};

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightHtml(text, query) {
  const safe = escapeHtml(text);
  if (!query) return { html: safe, count: 0 };
  const re = new RegExp(escapeRegex(query), 'gi');
  let count = 0;
  const html = safe.replace(re, m => { count++; return '<span class="hl">' + m + '</span>'; });
  return { html, count };
}

function extractOutline(parts) {
  const out = [];
  let abs = 0;
  parts.forEach((part) => {
    out.push({ kind: 'source', label: part.source, line: abs + 1 });
    const lines = part.body.split(/\r?\n/);
    for (let i = 0; i < lines.length; i++) {
      abs++;
      const line = lines[i];
      const md = /^(#{1,4})\s+(.+?)\s*$/.exec(line);
      if (md) { out.push({ kind: 'h', level: md[1].length, label: md[2], line: abs }); continue; }
      if (/^(Usage|Arguments|Options|Commands|Examples)(:|\s)/.test(line)) {
        const label = line.split(':')[0] + ':';
        out.push({ kind: 'h', level: 2, label, line: abs });
      }
    }
  });
  return out;
}

function renderOutline(parts, paneSide) {
  const items = extractOutline(parts);
  const target = $('#outline-' + paneSide);
  if (items.length === 0) {
    target.innerHTML = '<div class="outline-source" style="opacity:0.6">(no headings)</div>';
    return;
  }
  const buf = [];
  for (const it of items) {
    if (it.kind === 'source') {
      buf.push('<div class="outline-source">' + escapeHtml(it.label) + '</div>');
    } else {
      const cls = 'h' + Math.min(it.level, 4);
      buf.push('<a class="' + cls + '" data-line="' + it.line + '">' + escapeHtml(it.label) + '</a>');
    }
  }
  target.innerHTML = buf.join('');
  target.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      const ln = a.getAttribute('data-line');
      const el = document.querySelector('#body-' + paneSide + ' [data-line="' + ln + '"]');
      if (el) el.scrollIntoView({ block: 'start', behavior: 'smooth' });
    });
  });
}

function classifyLine(text) {
  if (/^# /.test(text)) return 'h1';
  if (/^## /.test(text)) return 'h2';
  if (/^### /.test(text)) return 'h3';
  return '';
}

function renderLineRow(docId, abs, text, search) {
  const cls = classifyLine(text);
  const { html, count } = highlightHtml(text, search);
  const notes = state.comments[docId] && state.comments[docId][abs] ? state.comments[docId][abs] : [];
  const noteCls = notes.length > 0 ? ' has-note' : '';
  const lineHtml =
    '<div class="line ' + cls + '" data-line="' + abs + '">' +
      '<span class="num' + noteCls + '" data-doc="' + docId + '" data-line-abs="' + abs + '">' + abs + '</span>' +
      '<span class="text">' + (html.length === 0 ? '&nbsp;' : html) + '</span>' +
    '</div>';
  let extra = '';
  const composerOpen = state.openComposer && state.openComposer.doc === docId && state.openComposer.line === abs;
  if (notes.length > 0 || composerOpen) {
    extra = renderNotesBlock(docId, abs, notes);
  }
  return { html: lineHtml + extra, count };
}

function renderDoc(doc, paneSide) {
  const body = $('#body-' + paneSide);
  const buf = [];
  let abs = 0;
  const search = state.search.trim();
  let total = 0;
  doc.parts.forEach((part) => {
    buf.push('<div class="divider">' + escapeHtml(part.source) + '</div>');
    const lines = part.body.split(/\r?\n/);
    for (let i = 0; i < lines.length; i++) {
      abs++;
      const r = renderLineRow(doc.id, abs, lines[i], search);
      buf.push(r.html);
      total += r.count;
    }
  });
  body.innerHTML = buf.join('');
  wireBodyActions(body, paneSide);
  return total;
}

function renderCli(c, paneSide) {
  const body = $('#body-' + paneSide);
  const buf = [];
  buf.push('<div class="divider">' + escapeHtml(c.cmd) + '</div>');
  const lines = c.body.split(/\r?\n/);
  const search = state.search.trim();
  let total = 0;
  for (let i = 0; i < lines.length; i++) {
    const abs = i + 1;
    const r = renderLineRow(c.id, abs, lines[i], search);
    buf.push(r.html);
    total += r.count;
  }
  body.innerHTML = buf.join('');
  wireBodyActions(body, paneSide);
  return total;
}

function renderNotesBlock(docId, line, notes) {
  const buf = ['<div class="notes-block" data-line="' + line + '">'];
  for (const n of notes) {
    buf.push(
      '<div class="note" data-id="' + n.id + '">' +
        '<div class="meta">' +
          '<span>' + new Date(n.ts).toLocaleString() + '</span>' +
          '<button data-action="edit">edit</button>' +
          '<button data-action="delete">delete</button>' +
        '</div>' +
        (n.quote ? '<div class="quote">' + escapeHtml(n.quote) + '</div>' : '') +
        '<div class="text">' + escapeHtml(n.text) + '</div>' +
      '</div>'
    );
  }
  if (state.openComposer && state.openComposer.doc === docId && state.openComposer.line === line) {
    const editId = state.openComposer.editId;
    const editing = editId ? notes.find(x => x.id === editId) : null;
    const initial = editing ? editing.text : '';
    const quote = editing && editing.quote ? editing.quote : state.openComposer.quote;
    buf.push(
      '<div class="note" data-composer>' +
        (quote ? '<div class="quote">' + escapeHtml(quote) + '</div>' : '') +
        '<textarea class="composer-text" placeholder="Add a note about line ' + line + '…">' + escapeHtml(initial) + '</textarea>' +
        '<div class="ed-row">' +
          '<button class="btn" data-action="save">' + (editing ? 'Update' : 'Save') + '</button>' +
          '<button class="btn secondary" data-action="cancel">Cancel</button>' +
        '</div>' +
      '</div>'
    );
  }
  buf.push('</div>');
  return buf.join('');
}

function wireBodyMouseup(paneSide) {
  const root = $('#body-' + paneSide);
  root.addEventListener('mouseup', (ev) => {
    if (ev.target.closest('.notes-block')) return;
    if (ev.target.closest('.num')) return;
    if (ev.target.closest('.divider')) return;
    const lineEl = ev.target.closest('.line');
    if (!lineEl) return;
    const docId = paneSide === 'l' ? state.left : state.right;
    let line = parseInt(lineEl.getAttribute('data-line'), 10);
    let quote = null;
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && !sel.isCollapsed && root.contains(sel.anchorNode)) {
      const text = sel.toString().trim();
      if (text.length > 0) {
        quote = text;
        const startEl = (sel.anchorNode.nodeType === 1 ? sel.anchorNode : sel.anchorNode.parentElement);
        const startLine = startEl.closest('.line');
        if (startLine) line = parseInt(startLine.getAttribute('data-line'), 10);
      }
    }
    openComposer(docId, line, paneSide, quote);
  });
}

function wireBodyActions(root, paneSide) {
  root.querySelectorAll('.num').forEach(el => {
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const docId = el.getAttribute('data-doc');
      const ln = parseInt(el.getAttribute('data-line-abs'), 10);
      openComposer(docId, ln, paneSide, null);
    });
  });
  root.querySelectorAll('.notes-block').forEach(block => {
    const line = parseInt(block.getAttribute('data-line'), 10);
    block.querySelectorAll('.note').forEach(noteEl => {
      const noteId = noteEl.getAttribute('data-id');
      const docId = block.closest('.body').id === 'body-l' ? state.left : state.right;
      noteEl.querySelectorAll('button').forEach(btn => {
        const action = btn.getAttribute('data-action');
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (action === 'delete') {
            deleteNote(docId, line, noteId);
            rerender(paneSide);
          } else if (action === 'edit') {
            state.openComposer = { doc: docId, line, editId: noteId };
            rerender(paneSide);
            const ta = $('.composer-text');
            if (ta) ta.focus();
          } else if (action === 'save') {
            const text = block.querySelector('.composer-text').value.trim();
            if (text.length > 0) saveNote(docId, line, text, state.openComposer.editId, state.openComposer.quote);
            state.openComposer = null;
            rerender(paneSide);
          } else if (action === 'cancel') {
            state.openComposer = null;
            rerender(paneSide);
          }
        });
      });
    });
  });
}

function openComposer(docId, line, paneSide, quote) {
  state.openComposer = { doc: docId, line, editId: null, quote: quote ? quote : null };
  rerender(paneSide);
  // scroll the composer into view so user can immediately see + type
  const composer = document.querySelector('#body-' + paneSide + ' [data-composer]');
  if (composer) composer.scrollIntoView({ block: 'center', behavior: 'smooth' });
  const ta = $('.composer-text');
  if (ta) ta.focus();
  // clear browser selection so the highlight doesn't linger as visual noise
  if (window.getSelection) window.getSelection().removeAllRanges();
}

function saveNote(docId, line, text, editId, quote) {
  if (!state.comments[docId]) state.comments[docId] = {};
  if (!state.comments[docId][line]) state.comments[docId][line] = [];
  if (editId) {
    const arr = state.comments[docId][line];
    const idx = arr.findIndex(n => n.id === editId);
    if (idx >= 0) arr[idx] = { id: editId, text, ts: Date.now(), quote: arr[idx].quote ? arr[idx].quote : null };
  } else {
    state.comments[docId][line].push({
      id: 'n_' + Math.random().toString(36).slice(2, 9),
      text, ts: Date.now(),
      quote: quote ? quote : null,
    });
  }
  saveComments();
}
function deleteNote(docId, line, id) {
  if (!state.comments[docId] || !state.comments[docId][line]) return;
  state.comments[docId][line] = state.comments[docId][line].filter(n => n.id !== id);
  if (state.comments[docId][line].length === 0) delete state.comments[docId][line];
  if (Object.keys(state.comments[docId]).length === 0) delete state.comments[docId];
  saveComments();
}

let lastLeftMatches = 0, lastRightMatches = 0;

function renderLeft() {
  const doc = DATA.docs.find(d => d.id === state.left);
  if (!doc) return;
  $('#blurb-l').textContent = doc.blurb;
  const totalLines = doc.parts.reduce((s, p) => s + p.body.split(/\r?\n/).length, 0);
  $('#lines-l').textContent = totalLines.toLocaleString();
  $('#parts-l').textContent = doc.parts.length;
  renderOutline(doc.parts, 'l');
  lastLeftMatches = renderDoc(doc, 'l');
}
function renderRight() {
  const c = DATA.cli.find(x => x.id === state.right);
  if (!c) return;
  $('#blurb-r').textContent = c.groupLabel;
  $('#lines-r').textContent = c.body.split(/\r?\n/).length.toLocaleString();
  $('#cmd-r').textContent = c.cmd;
  renderOutline([{ source: c.cmd, body: c.body }], 'r');
  lastRightMatches = renderCli(c, 'r');
}
function rerender(paneSide) {
  if (paneSide === 'l' || !paneSide) {
    const sl = $('#body-l').scrollTop;
    renderLeft();
    $('#body-l').scrollTop = sl;
  }
  if (paneSide === 'r' || !paneSide) {
    const sr = $('#body-r').scrollTop;
    renderRight();
    $('#body-r').scrollTop = sr;
  }
  updateSearchCounts();
}
function updateSearchCounts() {
  const q = state.search.trim();
  if (!q) { $('#search-counts').textContent = ''; return; }
  $('#search-counts').textContent = lastLeftMatches + ' · ' + lastRightMatches;
}

function buildPicker(selectEl, items, kind) {
  const groups = {};
  const order = [];
  for (const it of items) {
    const g = kind === 'doc' ? it.group : it.groupLabel;
    if (!groups[g]) { groups[g] = []; order.push(g); }
    groups[g].push(it);
  }
  const buf = [];
  for (const g of order) {
    buf.push('<optgroup label="' + escapeHtml(g) + '">');
    for (const it of groups[g]) {
      const lines = kind === 'doc'
        ? it.parts.reduce((s, p) => s + p.body.split(/\r?\n/).length, 0)
        : it.body.split(/\r?\n/).length;
      buf.push('<option value="' + it.id + '">' + escapeHtml(it.label) + ' (' + lines + ')</option>');
    }
    buf.push('</optgroup>');
  }
  selectEl.innerHTML = buf.join('');
}

buildPicker($('#pick-l'), DATA.docs, 'doc');
buildPicker($('#pick-r'), DATA.cli, 'cli');
wireBodyMouseup('l');
wireBodyMouseup('r');

const defLeft = DATA.docs.find(d => d.id === 'oc-discovery');
const defRight = DATA.cli.find(c => c.cmd === 'sis agent spawn -h');
state.left = defLeft ? defLeft.id : DATA.docs[0].id;
state.right = defRight ? defRight.id : DATA.cli[0].id;
$('#pick-l').value = state.left;
$('#pick-r').value = state.right;

$('#pick-l').addEventListener('change', e => {
  state.left = e.target.value; state.openComposer = null; renderLeft(); updateSearchCounts();
});
$('#pick-r').addEventListener('change', e => {
  state.right = e.target.value; state.openComposer = null; renderRight(); updateSearchCounts();
});

let searchTimer = null;
$('#search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = e.target.value; rerender(); }, 100);
});

$$('.outline-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const pane = $('#' + btn.getAttribute('data-pane'));
    pane.classList.toggle('collapsed');
    btn.textContent = pane.classList.contains('collapsed') ? '⟩' : '⟨';
  });
});

$('#export-notes').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state.comments, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sisviz-notes-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
});
$('#clear-notes').addEventListener('click', () => {
  if (!confirm('Delete all notes? This cannot be undone.')) return;
  state.comments = {};
  saveComments();
  rerender();
});

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (e.key === '/' && tag !== 'INPUT' && tag !== 'TEXTAREA') {
    e.preventDefault(); $('#search').focus();
  }
  if (e.key === 'Escape' && state.openComposer) {
    state.openComposer = null; rerender();
  }
});

updateNoteCount();
rerender();
</script>
</body>
</html>
